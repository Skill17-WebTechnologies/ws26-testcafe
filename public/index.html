<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WSC2026 · TestCafe 3.7.4</title>
    <style>body{font-family:system-ui,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#0b1020;color:#e7ecff}.card{background:#151c33;padding:2.5rem 3rem;border-radius:16px}.v{color:#36b6ff}button{font-size:1rem;padding:.6rem 1.2rem;border-radius:8px;border:0;background:#36b6ff;color:#0b1020;font-weight:600;cursor:pointer}</style>
  </head>
  <body>
    <main class="card">
      <h1>TestCafe <span class="v">3.7.4</span></h1>
      <p>WSC2026 Web Technologies — app under test.</p>
      <button id="btn">Click me</button>
      <p id="out"></p>
    </main>
    <script>
      let n = 0
      document.getElementById('btn').addEventListener('click', () => {
        n++; document.getElementById('out').textContent = 'Clicked ' + n + ' times'
      })
    </script>
  </body>
</html>
